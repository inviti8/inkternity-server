user  nginx;
worker_processes  auto;

events {
    worker_connections  1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile on;
    keepalive_timeout 65;

    # Connection upgrade map: tells nginx to switch protocols on
    # "Upgrade: websocket" headers.
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    # ----------------------------------------------------------------
    # HTTP :80
    #   - ACME HTTP-01 challenge (certbot writes to /var/www/certbot)
    #   - everything else: redirect to HTTPS
    # ----------------------------------------------------------------
    server {
        listen 80 default_server;
        server_name _;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ----------------------------------------------------------------
    # HTTPS :443 — signal.heavymeta.art (signaling)
    #   - WSS upgrade on /<globalID> -> signaling:8000 websocket port
    #   - /health -> signaling:8001 (the aiohttp health listener)
    # NOTE: replace `signal.heavymeta.art` below with your DOMAIN_SIGNAL
    # value at deploy time (vps_startup.sh does this substitution).
    # ----------------------------------------------------------------
    server {
        listen 443 ssl http2;
        server_name signal.heavymeta.art;

        ssl_certificate     /etc/letsencrypt/live/signal.heavymeta.art/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/signal.heavymeta.art/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;

        location = /health {
            proxy_pass http://signaling:8001/health;
        }

        # Everything else: WS upgrade. The signaling server expects the
        # client's globalID as the URL path; nginx forwards $request_uri
        # unchanged so /<globalID> reaches it intact.
        location / {
            proxy_pass http://signaling:8000;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 86400s;   # WS connections are long-lived
            proxy_send_timeout 86400s;
        }
    }
}
