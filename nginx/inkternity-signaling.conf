# Inkternity signaling — host-nginx drop-in
#
# Lives at /etc/nginx/sites-available/inkternity-signaling on the VPS,
# symlinked into sites-enabled/. Designed to co-reside with hvym_tunnler's
# nginx config (which owns the default :80 / :443 listeners and the catch-all
# blocks for tunnel.* + custom domains).
#
# Install:
#   sudo cp nginx/inkternity-signaling.conf /etc/nginx/sites-available/inkternity-signaling
#   sudo ln -sf /etc/nginx/sites-available/inkternity-signaling \
#                /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# Requires:
#   - /etc/letsencrypt/live/signal.heavymeta.art/{fullchain,privkey}.pem
#     Issue via webroot through hvym's already-configured /var/www/acme:
#       sudo certbot certonly --webroot -w /var/www/acme \
#           -d signal.heavymeta.art \
#           -m ops@heavymeta.art --agree-tos --non-interactive
#   - inkternity-signaling.service listening on 127.0.0.1:8002 (WS)
#     and 127.0.0.1:8003 (aiohttp /health).
#
# coturn:
#   turn.heavymeta.art does NOT proxy through nginx — coturn listens
#   directly on :3478 (TCP+UDP) and the wide UDP relay range. The DNS A
#   record for turn.heavymeta.art -> this VPS, plus open firewall ports,
#   are all that's needed on the nginx side.

# Connection-upgrade map. nginx requires this in http {} context;
# sites-available files are included inside http {} so declaring it here
# is valid. Named to avoid colliding with anything hvym_tunnler might add.
map $http_upgrade $signal_connection_upgrade {
    default upgrade;
    ''      close;
}

upstream inkternity_signaling_ws {
    server 127.0.0.1:8002;
    keepalive 32;
}

upstream inkternity_signaling_health {
    server 127.0.0.1:8003;
}

# ---------------------------------------------------------------------------
# :80 — ACME HTTP-01 challenge (webroot shared with hvym's nginx) + redirect
# ---------------------------------------------------------------------------
# hvym's nginx already has a default_server on :80 that handles the same
# ACME path and redirect. This explicit block claims signal.heavymeta.art
# specifically so behavior is owned by *this* config, not by hvym's catch-all.
server {
    listen 80;
    listen [::]:80;
    server_name signal.heavymeta.art;

    location /.well-known/acme-challenge/ {
        root /var/www/acme;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ---------------------------------------------------------------------------
# :443 — WSS signaling + /health
# ---------------------------------------------------------------------------
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name signal.heavymeta.art;

    ssl_certificate     /etc/letsencrypt/live/signal.heavymeta.art/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/signal.heavymeta.art/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;

    # Match hvym_tunnler's security header baseline so the two stacks
    # present a consistent surface.
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Health endpoint — separate aiohttp listener on :8003.
    location = /health {
        proxy_pass http://inkternity_signaling_health/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # Everything else: WS upgrade. The signaling server expects the
    # client's globalID as the URL path; nginx forwards $request_uri
    # unchanged so /<globalID> reaches it intact.
    location / {
        proxy_pass http://inkternity_signaling_ws;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $signal_connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400s;   # WS connections are long-lived
        proxy_send_timeout 86400s;
    }
}
