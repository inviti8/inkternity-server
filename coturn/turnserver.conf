# Inkternity coturn configuration
#
# Reference: https://github.com/coturn/coturn/blob/master/examples/etc/turnserver.conf
# Most directives left at coturn defaults. Comments mark every value
# vps_startup.sh substitutes from the .env file.

# ----------------------------------------------------------------
# Listening ports
# ----------------------------------------------------------------
# UDP/TCP STUN+TURN listener
listening-port=3478

# UDP relay port range — must match TURN_MIN_PORT/TURN_MAX_PORT in .env
# AND be opened in the host firewall. Wide range supports many concurrent
# relayed sessions.
min-port=49152
max-port=65535

# ----------------------------------------------------------------
# Authentication
# ----------------------------------------------------------------
# Long-term static credentials. Username + password baked into the
# Inkternity client's default_p2p.json. Rotate via scripts/rotate_turn_secret.sh.
# Substituted from .env at deploy time.
lt-cred-mech
user=__TURN_USERNAME__:__TURN_SECRET__

# Realm advertised in TURN responses (cosmetic; reuse TURN_REALM from .env).
realm=__TURN_REALM__

# ----------------------------------------------------------------
# TLS (optional, for TURNS over TLS on 5349)
# ----------------------------------------------------------------
# Uncomment to enable TURNS. Cert paths assume coturn container has
# /etc/letsencrypt/live/${DOMAIN_TURN} mounted at /etc/coturn/certs.
# tls-listening-port=5349
# cert=/etc/coturn/certs/fullchain.pem
# pkey=/etc/coturn/certs/privkey.pem

# ----------------------------------------------------------------
# Operational hygiene
# ----------------------------------------------------------------
# No CLI access (we manage via docker logs / docker exec).
no-cli

# Block relays to internal/private IPs; prevents the TURN server from
# being abused as an outbound proxy into the host's private network.
no-multicast-peers
denied-peer-ip=10.0.0.0-10.255.255.255
denied-peer-ip=172.16.0.0-172.31.255.255
denied-peer-ip=192.168.0.0-192.168.255.255
denied-peer-ip=169.254.0.0-169.254.255.255
denied-peer-ip=127.0.0.0-127.255.255.255

# Log to stderr so docker logs picks it up.
log-file=stdout
verbose
